          <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleRead(${item.id})">
          <div class="info">
            <span class="year">[${item.year}]</span>
            <span class="author">${item.author}</span> - 
            <span class="work">${item.work}</span>
          </div>
        `;
        listDiv.appendChild(div);
      });

      updateProgress();
    }

    function toggleRead(id) {
      if (savedRead.includes(id)) {
        savedRead = savedRead.filter(readId => readId !== id);
      } else {
        savedRead.push(id);
      }
      localStorage.setItem('nobel_read', JSON.stringify(savedRead));
      updateProgress();
    }

    function updateProgress() {
      const total = data.length;
      const count = savedRead.length;
      const percent = total > 0 ? ((count / total) * 100).toFixed(1) : 0;

      document.getElementById('status').innerText = `읽은 책: ${count} / ${total} (${percent}%)`;
      document.getElementById('progress').style.width = `${percent}%`;
    }

    render();
  </script>
</body>
</html>
